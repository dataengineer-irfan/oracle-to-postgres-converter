  table_name: G_CMN_REVW_TB
  subject_area: Providers
  maps_to_ldm_entity: CommonEntity
  description: The Review Table contains dated spans that identify the criteria that
    must be met for putting an entity (member or provider) on review. "On Review"
    means that any claims coming in for this specific entity where the date of service
    falls within the Review span dates and where the claim criteria matches the criteria
    stored in this table will post an exception and be further processed according
    to the fields in the Claims Exception Control table for the exception code. This
    Review Table contains the review criteria, which claim exception code to post
    when the criteria are met, and an optional Location/User ID override where the
    claim should be routed. The review criteria use the Mapset functionality to define
    the conditions that must be met for an exception to be posted to claim
  grain: One row per G_CMN_ENTY_SK, G_REVW_SEQ_NUM.
  columns:
  - column_name: G_CMN_ENTY_SK
    data_type: NUMBER(10,0)
