  table_name: G_ADR_PHONE_USG_TB
  subject_area: Providers
  maps_to_ldm_entity: ProviderAddress
  description: The Address Phone Usage Table associates a phone [that is associated
    with an entity] with an address [that is associated with an entity]. Before this
    Table existed, we knew that an entity had X number of phones and Y number of addresses,
    but we didn't know which phones were associated with which addresses. So this
    Table tells us that, for a particular entity, Phone1 is associated with Office2
    and Phone3 is associated with Office4.
  grain: One row per G_CMN_ENTY_SK, G_ADR_USG_TY_CD, G_ADR_SK, G_ADR_USG_SEQ_NUM,
    G_PHONE_USG_TY_CD, G_PHONE_SK, G_PHONE_USG_SEQ_NUM.
  columns:
  - column_name: G_CMN_ENTY_SK
    data_type: NUMBER(10,0)
    nullable: false
    description: Surrogate Key for the Common Entity. This value may be referred to
      as Payer ID on some UI screens.
    pii_classification: none
    is_primary_key: true
    is_foreign_key: true
    references: provider.G_PHONE_USG_TB.G_CMN_ENTY_SK
  - column_name: G_ADR_USG_TY_CD
    data_type: VARCHAR2(2)
    nullable: false
    description: Member Residential Mailing Provider Service Location Billing Mailing
      Carrier Corporate Billing Payment
    pii_classification: none
    is_primary_key: true
    is_foreign_key: true
    references: common.G_ADR_USG_TB.G_ADR_USG_TY_CD
  - column_name: G_ADR_SK
    data_type: NUMBER(10,0)
    nullable: false
    description: Surrogate Key
    pii_classification: restricted
    is_primary_key: true
    is_foreign_key: true
    references: common.G_ADR_USG_TB.G_ADR_SK
  - column_name: G_ADR_USG_SEQ_NUM
    data_type: NUMBER(5,0)
    nullable: false
    description: Added to PK to ensure uniqueness and/or provide order to the rows.
    pii_classification: restricted
    is_primary_key: true
    is_foreign_key: true
    references: common.G_ADR_USG_TB.G_ADR_USG_SEQ_NUM
  - column_name: G_PHONE_USG_TY_CD
    data_type: VARCHAR2(2)
    nullable: false
    description: 'e.g. Home, Work, Cell, Home Fax, Work Fax, Bank, Web Access, etc.
      Member: Home, Work, Fax, Cell Provider: Phone, Fax (dual-purpose code would
      show Service Phone, Service Fax, Billing Phone, Billing Fax, Mailing Phone,
