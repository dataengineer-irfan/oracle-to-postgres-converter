  description: The Reference Mapset Header Table is used to define mapsets which may
    be referenced in the Benefit Plan mapping Tables, as well as other places throughout
    the system, as defined by the mapset type code. They are used to define a set
    of mapping criteria, which if the set of data values being evaluated fall within
    those criteria, identify a specific application condition, and associated processing
    rules to be applied. For example, if the set of services in a claim fall within
    a coverage mapset in the benefit plan mapping Tables, this will identify the claim
    as containing covered services which are eligible for payment.
  grain: One row per R_MPST_ID.
