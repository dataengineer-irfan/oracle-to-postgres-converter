entities:
  - entity_name: "Provider Affiliation"
    subject_area: "Affiliation / Ownership"
    business_definition: >
      The Provider Affiliation Table links groups to group members, billing agents (if billing agents exist) to their provider members, and associations to their members.
    synonyms: ["N/A"]
    attributes:
      - name: "Provider Affiliation Surrogate Key"
        business_definition: >
          Provider Affiliation Surrogate Key
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.P_AFFL_SK"
      - name: "Provider Group System Identifier"
        business_definition: >
          Provider Group System Identifier: If the enrolling provider is a group, this will be the same as the p enrolling system ID. If the enrolling provider is an individual, and the group provider that the has been identified as being affiliated with the individual is found on the system, then this field will be populated with that group provider's P-SYS-ID.
        data_classification: "restricted"
        maps_to_odm: "P_AFFL_TB.P_GRP_SYS_ID"
      - name: "Provider Member System Identifier"
        business_definition: >
          Provider Member System Identifier: If the enrolling provider is an individual, this will be the same as the p enrolling system ID. If the enrolling provider is a group, and the member provider that the group has identified as being affiliated with the group is found on the system, then this field will be populated with that member provider's P-SYS-ID.
        data_classification: "restricted"
        maps_to_odm: "P_AFFL_TB.P_MBR_SYS_ID"
      - name: "General Aud Add Timestamp"
        business_definition: >
          The timestamp when the row was added.
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.G_AUD_ADD_TS"
      - name: "General Aud Add User Identifier"
        business_definition: >
          The user ID or process that added the row.
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.G_AUD_ADD_USER_ID"
      - name: "General Aud Timestamp"
        business_definition: >
          The timestamp when the row was last modified.
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.G_AUD_TS"
      - name: "General Aud User Identifier"
        business_definition: >
          The user ID or process that last modified the row.
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.G_AUD_USER_ID"
      - name: "L Hibernate Ver Number"
        business_definition: >
          This supports hibernate caching mechanism and also supports the pessimistic Locking mechanism
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.L_HIBERNATE_VER_NUM"
      - name: "Provider Affiliation Begin Date"
        business_definition: >
          Begin date of a provider's affiliation with a group, etc.
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.P_AFFL_BEG_DT"
      - name: "Provider Affiliation End Date"
        business_definition: >
          End date of a provider's affiliation with a group, etc.
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.P_AFFL_END_DT"
      - name: "Provider Affiliation Type Code"
        business_definition: >
          The type of affiliation that links a provider with another provider.
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.P_AFFL_TY_CD"
      - name: "Provider Subcap Type Code"
        business_definition: >
          Sub capitation type code
        data_classification: "internal"
        maps_to_odm: "P_AFFL_TB.P_SUBCAP_TY_CD"
