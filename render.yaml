services:
  # 1. FastAPI Backend Service
  - type: web
    name: ets-migration-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    envVars:
      # Since you already have a Postgres DB on Render, you'll need to manually
      # paste your existing Internal Database URL into the Render dashboard 
      # for this backend service after deployment.
      - key: DATABASE_URL
        sync: false
      - key: PG_SCHEMA
        value: provider
      - key: COMMON_SCHEMA
        value: common

  # 3. React Frontend Static Site
  - type: web
    name: ets-migration-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ets-migration-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      # Ensure React Router handles client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
