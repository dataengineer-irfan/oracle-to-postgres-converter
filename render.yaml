databases:
  # 1. Managed PostgreSQL Database
  - name: ets-migration-db
    plan: free # Change to 'starter' for a non-expiring persistent database
    databaseName: ets_migration
    user: ets_user

services:
  # 2. FastAPI Backend Service
  - type: web
    name: ets-migration-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    envVars:
      # Render automatically sets DATABASE_URL from the linked database
      - key: DATABASE_URL
        fromDatabase:
          name: ets-migration-db
          property: connectionString
      - key: PG_SCHEMA
        value: provider
      - key: COMMON_SCHEMA
        value: common

  # 3. React Frontend Static Site
  - type: web
    name: ets-migration-frontend
    env: static
    plan: free
    buildCommand: cd ui && npm install && npm run build
    staticPublishPath: ./ui/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ets-migration-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      # Ensure React Router handles client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
